<html>
<head>
  <script src="https://cdn.firebase.com/js/client/1.1.1/firebase.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.0/jquery.min.js"></script>
  <link rel="stylesheet" type="text/css" href="css/leaderBoard.css">
</head>
<body>

<div class="example-base example-leaderboard l-demo-container">
  <div id="title">
    <img src="images/titleScreen1.png"></img>
  
  <h4>Play as Patch, the flickering spirit, in this action rogue-lite adventure. Explore the ever changing Gauntlet. Use different weapons, collect shiny things to survive as many floors as you can!</h4>
  <a href="http://gauntletgame.tumblr.com/"><img class="social"  src="images/tumblr.png"></img></a>
  <a href="https://www.facebook.com/pages/Shiny-Gauntlet/578531745596759"><img class="social"  src="images/facebook.png"></img></a>
  <a href="https://plus.google.com/102350874201507901283/about"><img class="social" src="images/google+.png"></img></a>
  <a href="https://twitter.com/ShinyGauntlet"><img class="social" src="images/twitter.png"></img></a>
  <iframe src="//itch.io/embed/10344" width="552" height="167" frameborder="0"></iframe> 
  <br/>
  <br/>  
  <a href="http://www.indiedb.com/games/shinygauntlet" title="View Shiny Gauntlet on Indie DB" target="_blank"><img src="http://button.indiedb.com/popularity/medium/games/34683.png" alt="Shiny Gauntlet" /></a>  

  <footer>

    <br/>
    <br/>

  </footer>
</div>
<script>


  var playerCount= 0;
  var name = "";
  // Create our Firebase reference
  var scoreListRef = new Firebase("https://shiny-gauntlet-lb.firebaseio.com/");

  // Keep a mapping of firebase locations to HTML elements, so we can move / remove elements as necessary.
  var htmlForPath = {};

  // Helper function that takes a new score snapshot and adds an appropriate row to our leaderboard table.
  function handleScoreAdded(scoreSnapshot, prevScoreName) {
    var newScoreRow = $("<tr/>");
    newScoreRow.append($("<td/>").append($("<em/>").text(scoreSnapshot.val().name)));
    newScoreRow.append($("<td/>").text(scoreSnapshot.val().score));

    // Store a reference to the table row so we can get it again later.
    htmlForPath[scoreSnapshot.name()] = newScoreRow;

    // Insert the new score in the appropriate place in the table.
    if (prevScoreName === null) {
      $("#leaderboardTable").append(newScoreRow);
    }
    else {
      var lowerScoreRow = htmlForPath[prevScoreName];
      lowerScoreRow.before(newScoreRow);
    }
    Firebase.goOffline();
    
    //Firebase.goOffline();
  }

  // Helper function to handle a score object being removed; just removes the corresponding table row.
  function handleScoreRemoved(scoreSnapshot) {
    var removedScoreRow = htmlForPath[scoreSnapshot.name()];
    removedScoreRow.remove();
    delete htmlForPath[scoreSnapshot.name()];
  }

  // Create a view to only receive callbacks for the last LEADERBOARD_SIZE scores
  var scoreListView = scoreListRef;

  // Add a callback to handle when a new score is added.
  scoreListView.on('child_added', function (newScoreSnapshot, prevScoreName) {
    handleScoreAdded(newScoreSnapshot, prevScoreName);
  });

  // Add a callback to handle when a score is removed
  scoreListView.on('child_removed', function (oldScoreSnapshot) {
    handleScoreRemoved(oldScoreSnapshot);
  });

  // Add a callback to handle when a score changes or moves positions.
  var changedCallback = function (scoreSnapshot, prevScoreName) {
    handleScoreRemoved(scoreSnapshot);
    handleScoreAdded(scoreSnapshot, prevScoreName);
  };
  scoreListView.on('child_moved', changedCallback);
  scoreListView.on('child_changed', changedCallback);

  // When the user presses enter on scoreInput, add the score, and update the highest score.
  $("#nameInput").keypress(function (e) {
    if (e.keyCode == 13) {
      var newScore = 9;//Number(localStorage.getItem("floorNum"));
      name = $("#nameInput").val();
      $("#nameInput").val("");

      if (name.length === 0){
        alert("please enter a name");
        return;
      }
      
      if (htmlForPath[name] != undefined){
        alert("name already taken");
        return;  
      }
      
      
      
      var userScoreRef = scoreListRef.child(name);
      playerCount = 0;

      // Use setWithPriority to put the name / score in Firebase, and set the priority to be the score.
      userScoreRef.setWithPriority({ name:name, score:newScore }, newScore);
    }
  });
  
</script>
</body>
</html>
