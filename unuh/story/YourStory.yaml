  - if ({isKadeem} == 1):
    - show kadeem_room:
    - show kadeem: normal AT CENTER WITH FADE     
    - kadeem says happy: Yaassss! Finally Edutrack reach! 
    
    - kadeem says normal: Getting to see my friends from other schools ... 
    - show heart: AT 300,200 WITH CUT
    - animate heart:
      time: 500
      alpha: 0
      position: 350 150
    - kadeem says normal: Especially Jamie is what I've been waiting for all year.    
    - kadeem says angry: Can't believe I'm not allowed to text with people on social media without parental monitoring ... 
    - kadeem says sad: Can't believe Mom seh she would ground me for life if I set up a finsta.    
    - play phoneNotification:
    
    - show phone_msg_mom_1: WITH CUT
    - kadeem says normal: What Mom saying now?
    - hide phone_msg_mom_1: WITH CUT
    - play phoneNotification:
    - show phone_msg_mom_2: WITH CUT
    - kadeem says sad: Ok then, I know Mom means well ... but I'm a high schooler! 
    - hide phone_msg_mom_2: WITH CUT     
    - kadeem says sad: Look at these clothes! 
    - kadeem says sad: I’m gonna have to transfer schools to have any street cred after this.   
    - kadeem says sad: Soooooo not lit. SMH.
    - kadeem says sad: So what's my plan of action?
    
    - choice:
      - Listen to Mom:
        - kadeem says normal: You know what, I'm gonna wear just wear this. 
        - kadeem says normal: It's not about how I look but how much fun I have.    
        - kadeem says happy: "* Takes Selfie *"
        - play phoneFlash:
        - show flash: WITH CUT 
        - hide flash: WITH FADE
        - kadeem says happy: I'll send this to her so she knows not to worry
      - Do your own thing:
        - kadeem says normal: This is MY time now.
        - kadeem says angry: I can handle myself. 
        - kadeem says normal: So I'll just wear this, take a selfie and send it to Moms 
        - kadeem says normal: And then change into something a bit cooler
        - play phoneFlash:
        - show flash: WITH CUT 
        - hide flash: WITH FADE         
        - kadeem says normal: "* Takes Selfie *"  
        - kadeem says normal: Alright, time to sort myself out. 
        - var isMessy: 1
        - show kadeemMessy: normal AT CENTER WITH CUT 
        - kadeem says normal: She'll never know ...
    - hide kadeem: WITH CUT 
    - if ({isMessy} == 1):
      - hide kadeemMessy: WITH CUT 
  - stop Dub01: WITH FADE  
  - scene: scene2
    
scene2:
