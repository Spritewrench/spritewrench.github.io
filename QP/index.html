    <style>
      /* Always set the map height explicitly to define the size of the div
       * element that contains the map. */
      #map {
        height: 100%;
      }
      /* Optional: Makes the sample page fill the window. */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        color: #333;
      }
      #progressbar{
        height: 26px;
        position: absolute;
        left: 50%;
        top: 50%;
        width: 200px;
        background: rgba(159, 159, 159, 0.5);
        border-radius: 10px;
        margin: -20px 0 0 -100px;
        padding: 2px;
      }
      #loading{
        transition: all 50ms ease;
        height: 20px;
        width: calc(100% - 10px);
        border-radius: 8px;
        background: #474747;
        position: absolute;
        margin: 3px;
        display: inline-block;
        animation: load 5s ease infinite;
      }
      #load{
        font-family: Arial;
        font-weight: bold;
        text-align: center;
        margin-top: -30px;
      }
      #userID{
        font-family: Helvetica;
        margin: auto;
        width: 50%;
        padding: 10px;   
        color: #ffff;
        font-weight: bold;
        text-align: center;
        position: sticky;
        height: 0px;
        top: calc( 100vh - 80px );    
      }
      #userIDHidden{
        position: fixed;
        bottom: 0;
        right: 0;
        pointer-events: none;
        opacity: 0;
        transform: scale(0);
      }
      @keyframes load{
        0%{
          width: 2%;
        }
        10%{
          width: 10%;
        }
      }      
    </style>

  </head>
